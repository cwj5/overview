name: Build and Release

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    container:
      image: quay.io/centos/centos:stream8
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev webkit2gtk-driver gir1.2-webkit2-4.1
      
      - name: Install npm dependencies
        run: npm install
      
      - name: Build
        run: npm run tauri build
      
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: mehu-linux-appimage
          path: src-tauri/target/release/bundle/appimage/

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}
      
      - name: Install npm dependencies
        run: npm install
      
      - name: Build
        run: npm run tauri build -- --target ${{ matrix.target }}
      
      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: mehu-macos-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - name: Install npm dependencies
        run: npm install
      
      - name: Build
        run: npm run tauri build
      
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: mehu-windows-msi
          path: src-tauri/target/release/bundle/msi/
