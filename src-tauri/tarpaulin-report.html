<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <style>:root {
  --color: black;
  --bg: white;
  --head-bg: white;
  --link: #338;

  --blue: #ccf;
  --red: #fcc;
  --yellow: #ffc;
  --green: #cfc;
}

[data-theme='dark'] {
  --color: white;
  --bg: black;
  --head-bg: #333;
  --link: #aaf;

  --blue: #225;
  --red: #522;
  --yellow: #552;
  --green: #252;
}

html,
body {
  margin: 0;
  padding: 0;
  color: var(--color);
  background: var(--bg);
}

.app {
  margin: 10px;
  padding: 0;
}

.files-list {
  margin: 10px 0 0;
  width: 100%;
  border-collapse: collapse;
}
.files-list__head {
  border: 1px solid #999;
}
.files-list__head > tr > th {
  padding: 10px;
  border: 1px solid #999;
  text-align: left;
  font-weight: normal;
  background: var(--head-bg);
}
.files-list__body {
}
.files-list__file {
  cursor: pointer;
}
.files-list__file:hover {
  background: var(--blue);
}
.files-list__file > td {
  padding: 10px;
  border: 1px solid #999;
}
.files-list__file > td:first-child::before {
  content: '\01F4C4';
  margin-right: 1em;
}
.files-list__file_low {
  background: var(--red);
}
.files-list__file_medium {
  background: var(--yellow);
}
.files-list__file_high {
  background: var(--green);
}
.files-list__file_folder > td:first-child::before {
  content: '\01F4C1';
  margin-right: 1em;
}

.file-header {
  border: 1px solid #999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
}

.file-header__back {
  margin: 10px;
  cursor: pointer;
  flex-shrink: 0;
  flex-grow: 0;
  text-decoration: underline;
  color: var(--link);
}

.file-header__name {
  margin: 10px;
  flex-shrink: 2;
  flex-grow: 2;
}

.file-header__stat {
  margin: 10px;
  flex-shrink: 0;
  flex-grow: 0;
}

.file-content {
  margin: 10px 0 0;
  border: 1px solid #999;
  padding: 10px;
  counter-reset: line;
  display: flex;
  flex-direction: column;
}

.code-line::before {
  content: counter(line);
  margin-right: 72px;
}
.code-line {
  margin: 0;
  height: 1em;
  counter-increment: line;

  position: absolute;
  padding: 0 0.3em 0.3em 0.3em;
  display: inherit;
  width: 100%;
}
.code-line_covered {
  background: var(--green);
}
.code-line_uncovered {
  background: var(--red);
}

.code-text-container {
  position: relative;
  height: 1em;
  padding: 0.3em 0;
}

.cover-indicator {
  display: flex;
  width: 100%;
  position: absolute;
  justify-content: end;
  height: 1em;
  align-items: center;
  padding: 0 0.3em 0.3em 0.3em;
}

.cover-indicator.check-cover::after {
  content: "\2713";
  font-weight: bold;
  background-color: var(--green);
  height: 1em;
}

.cover-indicator.no-cover::after {
  content: "\2716";
  font-weight: bold;
  background-color: var(--red);
  height: 1em;
}

.stat-line-hit {
  max-width: 48px;
  overflow: hidden;
  font-weight: bold;
  margin-right: 4px;
  background-color: var(--green);
  position: relative;
  top: 0.1em;
}

#theme-toggle-label {
  margin-left: 1ch;
}
</style>
</head>

          format!(\n                        \"Grid {} ({}×{}×{})\",\n                        idx, d.dimensions.i, d.dimensions.j, d.dimensions.k\n                    )\n                })\n                .collect::\u003cVec\u003c_\u003e\u003e()\n                .join(\", \");\n\n            log_info(\u0026format!(\n                \"Loaded ASCII grid file {} (endianness: ASCII, precision: f32, iblank: no)\",\n                path\n            ));\n            log_info(\u0026format!(\"Grids: {}\", dims_str));\n            Ok(grids)\n        }\n        Err(e) =\u003e {\n            let error_msg = format!(\"Error loading ASCII PLOT3D file: {}\", e);\n            log_error(\u0026error_msg);\n            Err(error_msg)\n        }\n    }\n}\n\n/// Load PLOT3D solution file (Q file) in binary format\n#[tauri::command]\nfn load_plot3d_solution(path: String) -\u003e Result\u003cVec\u003cPlot3DSolution\u003e, String\u003e {\n    log_debug(\u0026format!(\"Loading PLOT3D solution file: {}\", path));\n    match read_plot3d_solution(\u0026path) {\n        Ok(solutions) =\u003e {\n            cache_solutions(\u0026solutions);\n            // Get the metadata that was set by the reader\n            if let Some(metadata) = get_last_solution_metadata() {\n                log_info(\u0026format!(\n                    \"Loaded solution file {} ({} format, {} precision, endianness: {})\",\n                    path, metadata.format, metadata.precision, metadata.byte_order\n                ));\n            } else {\n                log_info(\u0026format!(\n                    \"Successfully loaded {} solution(s) from {} (binary format)\",\n                    solutions.len(),\n                    path\n                ));\n            }\n            Ok(solutions)\n        }\n        Err(e) =\u003e {\n            let error_msg = format!(\"Error loading PLOT3D solution file: {}\", e);\n            log_error(\u0026error_msg);\n            Err(error_msg)\n        }\n    }\n}\n\n/// Load PLOT "Failed to read file: {}\", e))?;\n\n    let is_likely_text = file_bytes\n        .iter()\n        .take(500)\n        .all(|\u0026b| b == b'\\n' || b == b'\\r' || b == b'\\t' || (b \u003e= 32 \u0026\u0026 b \u003c 127));\n\n    log_debug(\u0026format!(\n        \"File appears to be: {}\",\n        if is_likely_text {\n            \"text (ASCII)\"\n        } else {\n            \"binary\"\n        }\n    ));\n\n    // Try binary format first (more specific format)\n    match read_plot3d_solution(\u0026path) {\n        Ok(solutions) =\u003e {\n            cache_solutions(\u0026solutions);\n            // Get the metadata that was set by the reader\n            if let Some(metadata) = get_last_solution_metadata() {\n                log_info(\u0026format!(\n                    \"Loaded solution file {} ({} format, {} precision, endianness: {})\",\n                    path, metadata.format, metadata.precision, metadata.byte_order\n                ));\n            } else {\n                log_info(\u0026format!(\n                    \"Successfully loaded {} solution(s) from {} (binary format)\",\n                    solutions.len(),\n                    path\n                ));\n            }\n            Ok(solutions)\n        }\n        Err(binary_err) =\u003e {\n            // Binary failed, try ASCII format\n            log_debug(\u0026format!(\"Binary format failed: {}\", binary_err));\n            match read_plot3d_solution_ascii(\u0026path) {\n                Ok(solutions) =\u003e {\n                    cache_solutions(\u0026solutions);\n                    // Get the metadata that was set by the reader\n                    if let Some(metadata) = get_last_solution_metadata() {\n                        log_info(\u0026format!(\n                            \"Loaded solution file {} ({} format, {} precision)\",\n                            path, metadata.format, metadata.precision\n                        ));\n                    } else {\n                        l e {\n    // Emit loading start event\n    let _ = window.emit(\"loading-start\", \"Converting grid to mesh...\");\n\n    // Validate grid data\n    let total_points = grid.total_points();\n    if grid.x_coords.len() != total_points {\n        let error_msg = format!(\n            \"Invalid grid: x_coords length {} != expected {} ({}x{}x{})\",\n            grid.x_coords.len(),\n            total_points,\n            grid.dimensions.i,\n            grid.dimensions.j,\n            grid.dimensions.k\n        );\n        log_error(\u0026error_msg);\n        return Err(error_msg);\n    }\n    if grid.y_coords.len() != total_points {\n        let error_msg = format!(\n            \"Invalid grid: y_coords length {} != expected {}\",\n            grid.y_coords.len(),\n            total_points\n        );\n        log_error(\u0026error_msg);\n        return Err(error_msg);\n    }\n    if grid.z_coords.len() != total_points {\n        let error_msg = format!(\n            \"Invalid grid: z_coords length {} != expected {}\",\n            grid.z_coords.len(),\n            total_points\n        );\n        log_error(\u0026error_msg);\n        return Err(error_msg);\n    }\n\n    // Auto-detect decimation based on grid size for better performance\n    let i = grid.dimensions.i as usize;\n    let j = grid.dimensions.j as usize;\n    let max_dim = i.max(j);\n\n    let decimation_factor = if max_dim \u003e 1000 {\n        4 // Very large grids: use 1/4 resolution\n    } else if max_dim \u003e 500 {\n        3 // Large grids: use 1/3 resolution\n    } else if max_dim \u003e 250 {\n        2 // Medium grids: use 1/2 resolution\n    } else {\n        1 // Small grids: full resolution\n    };\n\n    if decimation_factor \u003e 1 {\n        log_info(\u0026format!(\n            \"Grid size {}x{} - applying {}x decimation for performance\",\n            i, j, decimation_factor\n        ));\n    }\n\n    let mesh =\n        grid.to_mesh_surface_geometry_decimated(respect_iblank.unwrap_or(false), decimation_factor);\n\n    // Emit loading end event\n    let _ = window.emit(\"loading-end\", ());\n\n    Ok(mesh)\n}\n\n/// Slice a PLOT3D grid along a constant I, J, or K plane\n#[tauri::command]\nfn slice_grid(grid: Plot3DGrid, plane: String, index: u32) -\u003e Result\u003cPlot3DGrid, String\u003e {\n    log_debug(\u0026format!(\n        \"Slicing grid along {} plane at index {}\",\n        plane, index\n    ));\n    grid.slice_grid(\u0026plane, index).map_err(|e| {\n        let error_msg = format!(\"Failed to slice grid: {}\", e);\n        log_error(\u0026error_msg);\n        error_msg\n    })\n}\n\n#[derive(Deserialize)]\nstruct ComputeSolutionColorsArgs {\n    grid: Plot3DGrid,\n    solution: Plot3DSolution,\n    field: String,\n    #[serde(alias = \"colorScheme\", alias = \"color_scheme\")]\n    color_scheme: String,\n}\n\n#[derive(Deserialize)]\nstruct ComputeSolutionColorsCachedArgs {\n    grid: Plot3DGrid,\n    #[serde(alias = \"gridIndex\", alias = \"grid_index\")]\n    grid_index: usize,\n    field: String,\n    #[serde(alias = \"colorScheme\", alias = \"color_scheme\")]\n    color_scheme: String,\n}\n\n/// Compute scalar field colors for a grid with solution data\n#[tauri::command]\nfn compute_solution_colors(\n    grid: Plot3DGrid,\n    solution: Plot3DSolution,\n    field: String,\n    color_scheme: String,\n    window: WebviewWindow,\n) -\u003e Result\u003cMeshGeometry, String\u003e {\n    use solution::{compute_colors, compute_scalar_field_surface, ColorScheme, ScalarField};\n\n    // Emit loading start event\n    let _ = window.emit(\"loading-start\", format!(\"Computing {} field...\", field));\n\n    let args = ComputeSolutionColorsArgs {\n        grid,\n        solution,\n        field,\n        color_scheme,\n    };\n\n    // Parse field type\n    let field_enum = ScalarField::from_str(\u0026args.field)\n        .ok_or_else(|| format!(\"Unknown scalar field: {}\", args.field))?;\n\n    // Parse color scheme\n    let scheme = ColorScheme::from_str(\u0026args.color_scheme)\n        .ok_or_else(|| format!(\"Unknown color scheme: {}\", args.color_scheme))?;\n\n    // Validate solution matches grid\n    let grid_points = args.grid.total_points();\n    if args.solution.rho.len() != grid_points {\n        return Err(format!(\n            \"Solution points {} != grid points {}\",\n            args.solution.rho.len(),\n            grid_points\n        ));\n    }\n\n    // Auto-detect decimation based on grid size for better performance\n    let i = args.grid.dimensions.i as usize;\n    let j = args.grid.dimensions.j as usize;\n    let max_dim = i.max(j);\n\n    let decimation_factor = if max_dim \u003e 1000 {\n        4 // Very large grids: use 1/4 resolution\n    } else if max_dim \u003e 500 {\n        3 // Large grids: use 1/3 resolution\n    } else if max_dim \u003e 250 {\n        2 // Medium grids: use 1/2 resolution\n    } else {\n        1 // Small grids: full resolution\n    };\n\n    if decimation_factor \u003e 1 {\n        log_info(\u0026format!(\n            \"Solution grid size {}x{} - applying {}x decimation for performance\",\n            i, j, decimation_factor\n        ));\n    }\n\n    // Compute scalar values/colors for surface only\n    let values = compute_scalar_field_surface(\u0026args.solution, field_enum, decimation_factor);\n    let colors = compute_colors(\u0026values, \u0026scheme);\n\n    // Create surface mesh geometry (don't respect iblank for solution visualization)\n    let mut mesh = args\n        .grid\n        .to_mesh_surface_geometry_decimated(false, decimation_factor);\n    mesh.colors = Some(colors);\n\n    // Emit loading end event\n    let _ = window.emit(\"loading-end\", ());\n\n    Ok(mesh)\n}\n\n/// Compute scalar field colors using cached solution data\n#[tauri::command]\nfn compute_solution_colors_cached(\n    grid: Plot3DGrid,\n    grid_index: usize,\n    field: String,\n    color_scheme: String,\n    window: WebviewWindow,\n) -\u003e Result\u003cMeshGeometry, String\u003e {\n    use solution::{compute_colors, compute_scalar_field_surface, ColorScheme, ScalarField};\n\n    let _ = window.emit(\"loading-start\", format!(\"Computing {} field...\", field));\n\n    let args = ComputeSolutionColorsCachedArgs {\n        grid,\n        grid_index,\n        field,\n        color_scheme,\n    };\n\n    let field_enum = ScalarField::from_str(\u0026args.field)\n        .ok_or_else(|| format!(\"Unknown scalar field: {}\", args.field))?;\n\n    let scheme = ColorScheme::from_str(\u0026args.color_scheme)\n        .ok_or_else(|| format!(\"Unknown color scheme: {}\", args.color_scheme))?;\n\n    let solution = {\n        let store = SOLUTION_CACHE\n            .lock()\n            .map_err(|_| \"Solution cache lock poisoned\".to_string())?;\n        let cached = store\n            .iter()\n            .find(|sol| sol.grid_index == args.grid_index)\n            .ok_or_else(|| format!(\"No cached solution for grid index {}\", args.grid_index))?;\n        Arc::clone(cached)\n    };\n\n    let grid_points = args.grid.total_points();\n    if solution.rho.len() != grid_points {\n        return Err(format!(\n            \"Solution points {} != grid points {}\",\n            solution.rho.len(),\n            grid_points\n        ));\n    }\n\n    let i = args.grid.dimensions.i as usize;\n    let j = args.grid.dimensions.j as usize;\n    let max_dim = i.max(j);\n\n    let decimation_factor = if max_dim \u003e 1000 {\n        4\n    } else if max_dim \u003e 500 {\n        3\n    } else if max_dim \u003e 250 {\n        2\n    } else {\n        1\n    };\n\n    if decimation_factor \u003e 1 {\n        log_info(\u0026format!(\n            \"Solution grid size {}x{} - applying {}x decimation for performance\",\n            i, j, decimation_factor\n        ));\n    }\n\n    let values = compute_scalar_field_surface(\u0026solution, field_enum, decimation_factor);\n    let colors = compute_colors(\u0026values, \u0026scheme);\n\n    let mut mesh = args\n        .grid\n        .to_mesh_surface_geometry_decimated(false, decimation_factor);\n    mesh.colors = Some(colors);\n\n    let _ = window.emit(\"loading-end\", ());\n\n    Ok(mesh)\n}\n\n/// Compute scalar field colors only using cached solution data\n#[tauri::command]\nfn compute_solution_colors_only_cached(\n    grid_index: usize,\n    field: String,\n    color_scheme: String,\n) -\u003e Result\u003cVec\u003cf32\u003e, String\u003e {\n    use solution::{compute_colors, compute_scalar_field_surface, ColorScheme, ScalarField};\n\n    let field_enum =\n        ScalarField::from_str(\u0026field).ok_or_else(|| format!(\"Unknown scalar field: {}\", field))?;\n\n    let scheme = ColorScheme::from_str(\u0026color_scheme)\n        .ok_or_else(|| format!(\"Unknown color scheme: {}\", color_scheme))?;\n\n    let solution = {\n        let store = SOLUTION_CACHE\n            .lock()\n            .map_err(|_| \"Solution cache lock poisoned\".to_string())?;\n        let cached = store\n            .iter()\n            .find(|sol| sol.grid_index == grid_index)\n            .ok_or_else(|| format!(\"No cached solution for grid index {}\", grid_index))?;\n        Arc::clone(cached)\n    };\n\n    let i = solution.dimensions.i as usize;\n    let j = solution.dimensions.j as usize;\n    let max_dim = i.max(j);\n\n    let decimation_factor = if max_dim \u003e 1000 {\n        4\n    } else if max_dim \u003e 500 {\n        3\n    } else if max_dim \u003e 250 {\n        2\n    } else {\n        1\n    };\n\n    let values = compute_scalar_field_surface(\u0026solution, field_enum, decimation_factor);\n    Ok(compute_colors(\u0026values, \u0026scheme))\n}\n\n/// Helper function to compute a scalar field value from a single point's solution data\nfn compute_scalar_field_value(solution: \u0026Plot3DSolution, field: solution::ScalarField) -\u003e f32 {\n    use solution::ScalarField;\n\n    if solution.rho.is_empty() {\n        return 0.0;\n    }\n\n    match field {\n        ScalarField::Density =\u003e solution.rho[0],\n\n        ScalarField::VelocityMagnitude =\u003e {\n            let rho = solution.rho[0];\n            if rho \u003e 0.0 {\n                let u = solution.rhou[0] / rho;\n                let v = solution.rhov[0] / rho;\n                let w = solution.rhow[0] / rho;\n                (u * u + v * v + w * w).sqrt()\n            } else {\n                0.0\n            }\n        }\n\n        ScalarField::MomentumX =\u003e solution.rhou[0],\n        ScalarField::MomentumY =\u003e solution.rhov[0],\n        ScalarField::MomentumZ =\u003e solution.rhow[0],\n\n        ScalarField::Pressure =\u003e {\n            const DEFAULT_GAMMA: f32 = 1.4;\n            let rho = solution.rho[0];\n            if rho \u003e 0.0 {\n                let gamma = solution\n                    .gamma\n                    .as_ref()\n                    .map(|g| g[0])\n                    .unwrap_or(DEFAULT_GAMMA);\n                let u = solution.rhou[0] / rho;\n                let v = solution.rhov[0] / rho;\n                let w = solution.rhow[0] / rho;\n                let kinetic_energy = 0.5 * rho * (u * u + v * v + w * w);\n                let internal_energy = solution.rhoe[0] - kinetic_energy;\n                (gamma - 1.0) * internal_energy\n            } else {\n                0.0\n            }\n        }\n\n        ScalarField::Energy =\u003e solution.rhoe[0],\n    }\n}\n\n/// Compute scalar field colors for a sliced grid using original grid's solution data\n/// Maps sliced grid points back to their original indices for solution lookup\n#[tauri::command]\nfn compute_solution_colors_sliced(\n    sliced_grid: Plot3DGrid,\n    original_grid: Plot3DGrid,\n    grid_index: usize,\n    field: String,\n    color_scheme: String,\n    slice_plane: String,\n    slice_index: u32,\n    window: WebviewWindow,\n) -\u003e Result\u003cMeshGeometry, String\u003e {\n    use solution::{compute_colors, ColorScheme, ScalarField};\n\n    log_debug(\u0026format!(\n        \"compute_solution_colors_sliced called: plane={}, index={}, field={}, grid={}\",\n        slice_plane, slice_index, field, grid_index\n    ));\n    let _ = window.emit(\n        \"loading-start\",\n        format!(\"Computing {} field on slice...\", field),\n    );\n\n    let field_enum =\n        ScalarField::from_str(\u0026field).ok_or_else(|| format!(\"Unknown scalar field: {}\", field))?;\n\n    let scheme = ColorScheme::from_str(\u0026color_scheme)\n        .ok_or_else(|| format!(\"Unknown color scheme: {}\", color_scheme))?;\n\n    // Get the cached solution for this grid\n    let solution = {\n        let store = SOLUTION_CACHE\n            .lock()\n            .map_err(|_| \"Solution cache lock poisoned\".to_string())?;\n        let cached = store\n            .iter()\n            .find(|sol| sol.grid_index == grid_index)\n            .ok_or_else(|| format!(\"No cached solution for grid index {}\", grid_index))?;\n        Arc::clone(cached)\n    };\n\n    // Validate that solution dimensions match original grid\n    let grid_points = original_grid.total_points();\n    if solution.rho.len() != grid_points {\n        return Err(format!(\n            \"Solution points {} != original grid points {}\",\n            solution.rho.len(),\n            grid_points\n        ));\n    }\n\n    // Extract the original grid dimensions\n    let i_orig = original_grid.dimensions.i as usize;\n    let j_orig = original_grid.dimensions.j as usize;\n    let k_orig = original_grid.dimensions.k as usize;\n\n    // Extract the sliced grid dimensions\n    let i_slice = sliced_grid.dimensions.i as usize;\n    let j_slice = sliced_grid.dimensions.j as usize;\n    let _k_slice = sliced_grid.dimensions.k as usize;\n\n    let slice_idx = slice_index as usize;\n\n    // Map each point in the sliced grid back to its original indices to get solution values\n    let mut values = Vec::with_capacity(sliced_grid.total_points());\n\n    let linear_index_original =\n        |i: usize, j: usize, k: usize| -\u003e usize { i + j * i_orig + k * i_orig * j_orig };\n\n    match slice_plane.to_uppercase().as_str() {\n        \"K\" =\u003e {\n            // Constant K plane: sliced grid has dimensions (i_orig x j_orig x 1)\n            // Each point (i,j) in sliced grid maps to (i,j,slice_idx) in original\n            for j_idx in 0..j_slice {\n                for i_idx in 0..i_slice {\n                    let orig_i = i_idx;\n                    let orig_j = j_idx;\n                    let orig_k = slice_idx;\n\n                    if orig_i \u003e= i_orig || orig_j \u003e= j_orig || orig_k \u003e= k_orig {\n                        return Err(format!(\n                            \"K-slice mapping out of bounds: ({},{},{}) not in ({},{},{})\",\n                            orig_i, orig_j, orig_k, i_orig, j_orig, k_orig\n                        ));\n                    }\n\n                    let orig_linear = linear_index_original(orig_i, orig_j, orig_k);\n\n                    // Extract solution values at this point\n                    let rho = solution.rho[orig_linear];\n                    let rhou = solution.rhou[orig_linear];\n                    let rhov = solution.rhov[orig_linear];\n                    let rhow = solution.rhow[orig_linear];\n                    let rhoe = solution.rhoe[orig_linear];\n\n                    // Get gamma if available\n                    let gamma = solution.gamma.as_ref().map(|g| g[orig_linear]);\n\n                    // Create a temporary solution at this point to compute scalar field\n                    let point_solution = Plot3DSolution {\n                        grid_index: 0,\n                        dimensions: GridDimensions { i: 1, j: 1, k: 1 },\n                        rho: vec![rho],\n                        rhou: vec![rhou],\n                        rhov: vec![rhov],\n                        rhow: vec![rhow],\n                        rhoe: vec![rhoe],\n                        gamma: gamma.map(|g| vec![g]),\n                        metadata: None,\n                    };\n\n                    // Compute scalar field value\n                    let value = compute_scalar_field_value(\u0026point_solution, field_enum);\n                    values.push(value);\n                }\n            }\n        }\n        \"J\" =\u003e {\n            // Constant J plane: sliced grid has dimensions (i_orig x k_orig x 1)\n            // The sliced dimensions are remapped: i_slice=i_orig, j_slice=k_orig\n            // Each point (i,k) in sliced grid maps to (i,slice_idx,k) in original\n            for k_idx in 0..j_slice {\n                // j_slice becomes k for the loop\n                for i_idx in 0..i_slice {\n                    let orig_i = i_idx;\n                    let orig_j = slice_idx;\n                    let orig_k = k_idx;\n\n                    if orig_i \u003e= i_orig || orig_j \u003e= j_orig || orig_k \u003e= k_orig {\n                        return Err(format!(\n                            \"J-slice mapping out of bounds: ({},{},{}) not in ({},{},{})\",\n                            orig_i, orig_j, orig_k, i_orig, j_orig, k_orig\n                        ));\n                    }\n\n                    let orig_linear = linear_index_original(orig_i, orig_j, orig_k);\n\n                    let rho = solution.rho[orig_linear];\n                    let rhou = solution.rhou[orig_linear];\n                    let rhov = solution.rhov[orig_linear];\n                    let rhow = solution.rhow[orig_linear];\n                    let rhoe = solution.rhoe[orig_linear];\n\n                    let gamma = solution.gamma.as_ref().map(|g| g[orig_linear]);\n\n                    let point_solution = Plot3DSolution {\n                        grid_index: 0,\n                        dimensions: GridDimensions { i: 1, j: 1, k: 1 },\n                        rho: vec![rho],\n                        rhou: vec![rhou],\n                        rhov: vec![rhov],\n                        rhow: vec![rhow],\n                        rhoe: vec![rhoe],\n                        gamma: gamma.map(|g| vec![g]),\n                        metadata: None,\n                    };\n\n                    let value = compute_scalar_field_value(\u0026point_solution, field_enum);\n                    values.push(value);\n                }\n            }\n        }\n        \"I\" =\u003e {\n            // Constant I plane: sliced grid has dimensions (j_orig x k_orig x 1)\n            // The sliced dimensions are remapped: i_slice=j_orig, j_slice=k_orig\n            // Each point (j,k) in sliced grid maps to (slice_idx,j,k) in original\n            for k_idx in 0..j_slice {\n                // j_slice becomes k for the loop\n                for j_idx in 0..i_slice {\n                    // i_slice becomes j for the loop\n                    let orig_i = slice_idx;\n                    let orig_j = j_idx;\n                    let orig_k = k_idx;\n\n                    if orig_i \u003e= i_orig || orig_j \u003e= j_orig || orig_k \u003e= k_orig {\n                        return Err(format!(\n                            \"I-slice mapping out of bounds: ({},{},{}) not in ({},{},{})\",\n                            orig_i, orig_j, orig_k, i_orig, j_orig, k_orig\n                        ));\n                    }\n\n                    let orig_linear = linear_index_original(orig_i, orig_j, orig_k);\n\n                    let rho = solution.rho[orig_linear];\n                    let rhou = solution.rhou[orig_linear];\n                    let rhov = solution.rhov[orig_linear];\n                    let rhow = solution.rhow[orig_linear];\n                    let rhoe = solution.rhoe[orig_linear];\n\n                    let gamma = solution.gamma.as_ref().map(|g| g[orig_linear]);\n\n                    let point_solution = Plot3DSolution {\n                        grid_index: 0,\n                        dimensions: GridDimensions { i: 1, j: 1, k: 1 },\n                        rho: vec![rho],\n                        rhou: vec![rhou],\n                        rhov: vec![rhov],\n                        rhow: vec![rhow],\n                        rhoe: vec![rhoe],\n                        gamma: gamma.map(|g| vec![g]),\n                        metadata: None,\n                    };\n\n                    let value = compute_scalar_field_value(\u0026point_solution, field_enum);\n                    values.push(value);\n                }\n            }\n        }\n        _ =\u003e {\n            return Err(format!(\n                \"Invalid slice plane: {}. Must be 'I', 'J', or 'K'\",\n                slice_plane\n            ))\n        }\n    }\n\n    // Convert values to colors\n    let colors = compute_colors(\u0026values, \u0026scheme);\n    log_debug(\u0026format!(\n        \"Computed {} colors for slice {}{}\",\n        colors.len() / 3,\n        slice_plane,\n        slice_index\n    ));\n\n    // Create mesh geometry from sliced grid\n    // Use decimation_factor=1 for consistency with the sliced geometry size\n    let mut mesh = sliced_grid.to_mesh_surface_geometry_decimated(false, 1);\n    mesh.colors = Some(colors);\n\n    let _ = window.emit(\"loading-end\", ());\n\n    Ok(mesh)\n}\n\n#[tauri::command]\nasync fn open_file_dialog(app: tauri::AppHandle) -\u003e Result\u003cOption\u003cString\u003e, String\u003e {\n    let file_path = app.dialog().file().blocking_pick_file();\n\n    Ok(file_path.map(|f| f.to_string()))\n}\n\n#[tauri::command]\nasync fn open_multiple_files_dialog(app: tauri::AppHandle) -\u003e Result\u003cVec\u003cString\u003e, String\u003e {\n    let file_paths = app.dialog().file().blocking_pick_files();\n\n    Ok(file_paths\n        .map(|files| files.iter().map(|f| f.to_string()).collect())\n        .unwrap_or_default())\n}\n\n/// Detect if file is ASCII or binary format\n#[tauri::command]\nfn detect_file_format(path: String) -\u003e Result\u003cString, String\u003e {\n    let p = Path::new(\u0026path);\n\n    match p.extension().and_then(|e| e.to_str()) {\n        Some(\"q\") | Some(\"f\") =\u003e {\n            // Try to detect by reading first few bytes\n            std::fs::read(\u0026path)\n                .map_err(|e| e.to_string())\n                .and_then(|data| {\n                    if data.len() \u003c 4 {\n                        return Ok(\"unknown\".to_string());\n                    }\n\n                    // Check if file looks like ASCII (text)\n                    let first_chars = \u0026data[..data.len().min(100)];\n                    if first_chars\n                        .iter()\n                        .all(|\u0026b| b.is_ascii_graphic() || b.is_ascii_whitespace())\n                    {\n                        Ok(\"ascii\".to_string())\n                    } else {\n                        Ok(\"binary\".to_string())\n                    }\n                })\n        }\n        _ =\u003e Ok(\"unknown\".to_string()),\n    }\n}\n\n/// Get all log entries\n#[tauri::command]\nfn get_log_entries() -\u003e Result\u003cVec\u003cLogEntry\u003e, String\u003e {\n    Ok(get_logs())\n}\n\n/// Clear all log entries\n#[tauri::command]\nfn clear_log_entries() -\u003e Result\u003c(), String\u003e {\n    clear_logs();\n    Ok(())\n}\n\n/// Export logs to a file\n#[tauri::command]\nfn export_logs_to_file(path: String) -\u003e Result\u003c(), String\u003e {\n    export_logs(\u0026path).map_err(|e| {\n        let error_msg = format!(\"Failed to export logs: {}\", e);\n        log_error(\u0026error_msg);\n        error_msg\n    })?;\n    log_info(\u0026format!(\"Logs exported to {}\", path));\n    Ok(())\n}\n\n/// Open save file dialog for log export\n#[tauri::command]\nasync fn save_log_file_dialog(app: tauri::AppHandle) -\u003e Result\u003cOption\u003cString\u003e, String\u003e {\n    let file_path = app\n        .dialog()\n        .file()\n        .add_filter(\"Text Files\", \u0026[\"txt\"])\n        .add_filter(\"All Files\", \u0026[\"*\"])\n        .set_file_name(\"mehu-logs.txt\")\n        .blocking_save_file();\n\n    Ok(file_path.map(|f| f.to_string()))\n}\n\n/// Write text content to a file\n#[tauri::command]\nfn write_text_file(path: String, contents: String) -\u003e Result\u003c(), String\u003e {\n    use std::fs;\n    use std::io::Write;\n\n    let mut file =\n        fs::File::create(\u0026path).map_err(|e| format!(\"Failed to create file {}: {}\", path, e))?;\n\n    file.write_all(contents.as_bytes())\n        .map_err(|e| format!(\"Failed to write to file {}: {}\", path, e))?;\n\n    log_info(\u0026format!(\n        \"Successfully wrote {} bytes to {}\",\n        contents.len(),\n        path\n    ));\n    Ok(())\n}\n\n/// Print frontend debug messages to the terminal\n#[tauri::command]\nfn frontend_log(message: String) {\n    println!(\"[frontend] {}\", message);\n}\n\n/// Open the About window\n#[tauri::command]\nasync fn open_about_window(app: tauri::AppHandle) -\u003e Result\u003c(), String\u003e {\n    if let Some(window) = app.get_webview_window(\"about\") {\n        let _ = window.set_focus();\n        Ok(())\n    } else {\n        WebviewWindow::builder(\u0026app, \"about\", tauri::WebviewUrl::App(\"/about.html\".into()))\n            .title(\"About Mehu\")\n            .inner_size(600.0, 700.0)\n            .resizable(true)\n            .minimizable(true)\n            .maximizable(false)\n            .build()\n            .map_err(|e| format!(\"Failed to create About window: {}\", e))?;\n        Ok(())\n    }\n}\n\n#[cfg_attr(mobile, tauri::mobile_entry_point)]\npub fn run() {\n    // Initialize logging\n    logger::init_logger();\n    log_info(\"Application started\");\n\n    tauri::Builder::default()\n        .plugin(tauri_plugin_opener::init())\n        .plugin(tauri_plugin_dialog::init())\n        .invoke_handler(tauri::generate_handler![\n            greet,\n            load_plot3d_file,\n            load_plot3d_file_ascii,\n            load_plot3d_solution,\n            load_plot3d_solution_asci rns a new 2D grid representing the slice\n    pub fn slice_grid(\u0026self, plane: \u0026str, index: u32) -\u003e Result\u003cPlot3DGrid, String\u003e {\n        let i = self.dimensions.i as usize;\n        let j = self.dimensions.j as usize;\n        let k = self.dimensions.k as usize;\n\n        match plane.to_uppercase().as_str() {\n            \"I\" =\u003e {\n                // Constant I plane: varies in J and K\n                // Return as J x K x 1 so the surface renders at k=0\n                let i_idx = index as usize;\n                if i_idx \u003e= i {\n                    return Err(format!(\"I index {} out of bounds [0, {})\", i_idx, i));\n                }\n\n                let mut x_coords = Vec::with_capacity(j * k);\n                let mut y_coords = Vec::with_capacity(j * k);\n                let mut z_coords = Vec::with_capacity(j * k);\n                let mut iblank_vec = self.iblank.as_ref().map(|_| Vec::with_capacity(j * k));\n\n                // Iterate: for each K, for each J (so data fills in J order first)\n                for k_idx in 0..k {\n                    for j_idx in 0..j {\n                        let idx = Self::linear_index(i_idx, j_idx, k_idx, i, j);\n                        x_coords.push(self.x_coords[idx]);\n                        y_coords.push(self.y_coords[idx]);\n                        z_coords.push(self.z_coords[idx]);\n                        if let Some(ref mut iblank) = iblank_vec {\n                            iblank.push(self.iblank.as_ref().map(|ib| ib[idx]).unwrap_or(1));\n                        }\n                    }\n                }\n\n                Ok(Plot3DGrid {\n                    dimensions: GridDimensions {\n                        i: j as u32, // J becomes the new I\n                        j: k as u32, // K becomes the new J\n                        k: 1,        // Surface at k=0\n                    },\n                    x_coords,\n                    y_coords,\n                    z_coords,\n                    iblank: iblank_vec,\n                })\n            }\n            \"J\" =\u003e {\n                // Constant J plane: varies in I and K\n                // Return as I x K x 1 so the surface renders at k=0\n                let j_idx = index as usize;\n                if j_idx \u003e= j {\n                    return Err(format!(\"J index {} out of bounds [0, {})\", j_idx, j));\n                }\n\n                let mut x_coords = Vec::with_capacity(i * k);\n                let mut y_coords = Vec::with_capacity(i * k);\n                let mut z_coords = Vec::with_capacity(i * k);\n                let mut iblank_vec = self.iblank.as_ref().map(|_| Vec::with_capacity(i * k));\n\n                // Iterate: for each K, for each I (so data fills in I order first)\n                for k_idx in 0..k {\n                    for i_idx in 0..i {\n                        let idx = Self::linear_index(i_idx, j_idx, k_idx, i, j);\n                        x_coords.push(self.x_coords[idx]);\n                        y_coords.push(self.y_coords[idx]);\n                        z_coords.push(self.z_coords[idx]);\n                        if let Some(ref mut iblank) = iblank_vec {\n                            iblank.push(self.iblank.as_ref().map(|ib| ib[idx]).unwrap_or(1));\n                        }\n                    }\n                }\n\n                Ok(Plot3DGrid {\n                    dimensions: GridDimensions {\n                        i: i as u32,\n                        j: k as u32, // K becomes the new J\n                        k: 1,        // Surface at k=0\n                    },\n                    x_coords,\n                    y_coords,\n                    z_coords,\n                    iblank: iblank_vec,\n                })\n            }\n            \"K\" =\u003e {\n                // Constant K plane: varies in I and J\n                let k_idx = index as usize;\n                if k_idx \u003e= k {\n                    return Err(format!(\"K index {} out of bounds [0, {})\", k_idx, k));\n                }\n\n                let mut x_coords = Vec::with_capacity(i * j);\n                let mut y_coords = Vec::with_capacity(i * j);\n                let mut z_coords = Vec::with_capacity(i * j);\n                let mut iblank_vec = self.iblank.as_ref().map(|_| Vec::with_capacity(i * j));\n\n                for j_idx in 0..j {\n                    for i_idx in 0..i {\n                        let idx = Self::linear_index(i_idx, j_idx, k_idx, i, j);\n                        x_coords.push(self.x_coords[idx]);\n                        y_coords.push(self.y_coords[idx]);\n                        z_coords.push(self.z_coords[idx]);\n                        if let Some(ref mut iblank) = iblank_vec {\n                            iblank.push(self.iblank.as_ref().map(|ib| ib[idx]).unwrap_or(1));\n                        }\n                    }\n                }\n\n                Ok(Plot3DGrid {\n                    dimensions: GridDimensions {\n                        i: i as u32,\n                        j: j as u32,\n                        k: 1,\n                    },\n                    x_coords,\n                    y_coords,\n                    z_coords,\n                    iblank: iblank_vec,\n                })\n            }\n            _ =\u003e Err(format!(\n                \"Invalid plane: {}. Must be 'I', 'J', or 'K'\",\n                plane\n            )),\n        }\n    }\n\n    /// Convert PLOT3D grid to Three.js mesh geometry with optional decimation\n    /// decimation_factor: 1 = full resolution, 2 = half, 3 = third, etc.\n    /// This creates quad edges for wireframe display (4 edges per quad, no triangulation)\n    /// If respect_iblank is true and iblank data exists, points with iblank=0 are excluded\n    pub fn to_mesh_geometry_decimated(\n        \u0026self,\n        respect_iblank: bool,\n        decimation_factor: usize,\n    ) -\u003e MeshGeometry {\n        let decimation = decimation_factor.max(1); // Ensure at least 1\n\n        let i = self.dimensions.i as usize;\n        let j = self.dimensions.j as usize;\n        let total_points = self.total_points();\n\n        // Helper function to check if a point is blanked\n        let is_blanked = |idx: usize| -\u003e bool {\n            if respect_iblank {\n                if let Some(ref iblank) = self.iblank {\n                    return iblank[idx] == 0;\n                }\n            }\n            false\n        };\n\n        // Convert coordinates to vertex array (x, y, z interleaved)\n        // Pre-allocate with exact size\n        let mut vertices = Vec::with_capacity(total_points * 3);\n        for idx in 0..total_points {\n            vertices.push(self.x_coords[idx]);\n            vertices.push(self.y_coords[idx]);\n            vertices.push(self.z_coords[idx]);\n        }\n\n        // Calculate decimated grid dimensions\n        let i_decimated = ((i - 1) / decimation) + 1;\n        let j_decimated = ((j - 1) / decimation) + 1;\n\n        // Pre-calculate capacity for indices\n        // Each quad generates: 8 line indices (4 edges * 2 vertices) and 6 triangle indices (2 triangles * 3 vertices)\n        let max_quads = (i_decimated - 1) * (j_decimated - 1);\n        let mut line_indices = Vec::with_capacity(max_quads * 8);\n        let mut triangle_indices = Vec::with_capacity(max_quads * 6);\n\n        // Generate indices for both wireframe lines and solid triangles\n        // For a structured grid, we only render the k=1 surface (k=0 in 0-indexed)\n        let k_idx = 0;\n\n        for j_step in 0..j_decimated - 1 {\n            let j_idx = j_step * decimation;\n            let j_next = ((j_step + 1) * decimation).min(j - 1);\n\n            for i_step in 0..i_decimated - 1 {\n                let i_idx = i_step * decimation;\n                let i_next = ((i_step + 1) * decimation).min(i - 1);\n\n                let idx00 = Self::linear_index(i_idx, j_idx, k_idx, i, j);\n                let idx10 = Self::linear_index(i_next, j_idx, k_idx, i, j);\n                let idx01 = Self::linear_index(i_idx, j_next, k_idx, i, j);\n                let idx11 = Self::linear_index(i_next, j_next, k_idx, i, j);\n\n                // Skip this quad if any corner is blanked\n                if is_blanked(idx00) || is_blanked(idx10) || is_blanked(idx01) || is_blanked(idx11)\n                {\n                    continue;\n                }\n\n                // Line indices: 4 edges per quad\n                // Bottom edge (idx00 -\u003e idx10)\n                line_indices.push(idx00 as u32);\n                line_indices.push(idx10 as u32);\n\n                // Right edge (idx10 -\u003e idx11)\n                line_indices.push(idx10 as u32);\n                line_indices.push(idx11 as u32);\n\n                // Top edge (idx11 -\u003e idx01)\n                line_indices.push(idx11 as u32);\n                line_indices.push(idx01 as u32);\n\n                // Left edge (idx01 -\u003e idx00)\n                line_indices.push(idx01 as u32);\n                line_indices.push(idx00 as u32);\n\n                // Triangle indices: 2 triangles per quad\n                // First triangle: idx00, idx10, idx11\n                triangle_indices.push(idx00 as u32);\n                triangle_indices.push(idx10 as u32);\n                triangle_indices.push(idx11 as u32);\n\n                // Second triangle: idx00, idx11, idx01\n                triangle_indices.push(idx00 as u32);\n                triangle_indices.push(idx11 as u32);\n                triangle_indices.push(idx01 as u32);\n            }\n        }\n\n        // Compute simple vertex normals (averaged from adjacent faces) using parallel processing\n        // Pre-allocate normals array\n        let mut normals = vec![0.0f32; total_points * 3];\n\n        // Collect normal contributions in parallel (need to capture vertices by reference)\n        let vertices_ref = \u0026vertices;\n        let normal_contributions: Vec\u003c_\u003e = (0..j_decimated - 1)\n            .into_par_iter()\n            .flat_map(|j_step| {\n                let j_idx = j_step * decimation;\n                let j_next = ((j_step + 1) * decimation).min(j - 1);\n\n                (0..i_decimated - 1)\n                    .filter_map(move |i_step| {\n                        let i_idx = i_step * decimation;\n                        let i_next = ((i_step + 1) * decimation).min(i - 1);\n\n                        let idx00 = Self::linear_index(i_idx, j_idx, k_idx, i, j);\n                        let idx10 = Self::linear_index(i_next, j_idx, k_idx, i, j);\n                        let idx01 = Self::linear_index(i_idx, j_next, k_idx, i, j);\n                        let idx11 = Self::linear_index(i_next, j_next, k_idx, i, j);\n\n                        let v0 = [\n                            vertices_ref[idx00 * 3],\n                            vertices_ref[idx00 * 3 + 1],\n                            vertices_ref[idx00 * 3 + 2],\n                        ];\n                        let v1 = [\n                            vertices_ref[idx10 * 3],\n                            vertices_ref[idx10 * 3 + 1],\n                            vertices_ref[idx10 * 3 + 2],\n                        ];\n                        let v2 = [\n                            vertices_ref[idx01 * 3],\n                            vertices_ref[idx01 * 3 + 1],\n                            vertices_ref[idx01 * 3 + 2],\n                        ];\n\n                        // Compute quad normal using cross product\n                        let edge1 = [v1[0] - v0[0], v1[1] - v0[1], v1[2] - v0[2]];\n                        let edge2 = [v2[0] - v0[0], v2[1] - v0[1], v2[2] - v0[2]];\n\n                        let normal = [\n                            edge1[1] * edge2[2] - edge1[2] * edge2[1],\n                            edge1[2] * edge2[0] - edge1[0] * edge2[2],\n                            edge1[0] * edge2[1] - edge1[1] * edge2[0],\n                        ];\n\n                        Some(([idx00, idx10, idx01, idx11], normal))\n                    })\n                    .collect::\u003cVec\u003c_\u003e\u003e()\n            })\n            .collect();\n\n        // Apply normal contributions sequentially\n        for (indices, normal) in normal_contributions {\n            for \u0026idx in \u0026indices {\n                normals[idx * 3] += normal[0];\n                normals[idx * 3 + 1] += normal[1];\n                normals[idx * 3 + 2] += normal[2];\n            }\n        }\n\n        // Normalize normals in parallel\n        normals.par_chunks_mut(3).for_each(|chunk| {\n            let len = (chunk[0] * chunk[0] + chunk[1] * chunk[1] + chunk[2] * chunk[2]).sqrt();\n            if len \u003e 0.0 {\n                chunk[0] /= len;\n                chunk[1] /= len;\n                chunk[2] /= len;\n            }\n        });\n\n        // face_count represents number of triangles\n        let triangle_count = triangle_indices.len() / 3;\n\n        MeshGeometry {\n            vertices,\n            indices: line_indices,\n            triangle_indices,\n            normals,\n            vertex_count: total_points,\n            face_count: triangle_count,\n            colors: None,\n        }\n    }\n\n    /// Convert PLOT3D grid to surface-only mesh geometry with optional decimation (k=0).\n    /// This generates vertices only for the visible surface to reduce memory and GPU cost.\n    pub fn to_mesh_surface_geometry_decimated(\n        \u0026self,\n        respect_iblank: bool,\n        decimation_factor: usize,\n    ) -\u003e MeshGeometry {\n        let decimation = decimation_factor.max(1);\n\n        let i = self.dimensions.i as usize;\n        let j = self.dimensions.j as usize;\n        let k_idx = 0;\n\n        let i_decimated = ((i - 1) / decimation) + 1;\n        let j_decimated = ((j - 1) / decimation) + 1;\n\n        let is_blanked = |idx: usize| -\u003e bool {\n            if respect_iblank {\n                if let Some(ref iblank) = self.iblank {\n                    return iblank[idx] == 0;\n                }\n            }\n            false\n        };\n\n        let mut vertices = Vec::with_capacity(i_decimated * j_decimated * 3);\n        for j_step in 0..j_decimated {\n            let j_idx = (j_step * decimation).min(j - 1);\n            for i_step in 0..i_decimated {\n                let i_idx = (i_step * decimation).min(i - 1);\n                let idx = Self::linear_index(i_idx, j_idx, k_idx, i, j);\n                vertices.push(self.x_coords[idx]);\n                vertices.push(self.y_coords[idx]);\n                vertices.push(self.z_coords[idx]);\n            }\n        }\n\n        let max_quads = (i_decimated - 1) * (j_decimated - 1);\n        let mut line_indices = Vec::with_capacity(max_quads * 8);\n        let mut triangle_indices = Vec::with_capacity(max_quads * 6);\n\n        for j_step in 0..j_decimated - 1 {\n            let j_idx = (j_step * decimation).min(j - 1);\n            let j_next = ((j_step + 1) * decimation).min(j - 1);\n\n            for i_step in 0..i_decimated - 1 {\n                let i_idx = (i_step * decimation).min(i - 1);\n                let i_next = ((i_step + 1) * decimation).min(i - 1);\n\n                let idx00 = Self::linear_index(i_idx, j_idx, k_idx, i, j);\n                let idx10 = Self::linear_index(i_next, j_idx, k_idx, i, j);\n                let idx01 = Self::linear_index(i_idx, j_next, k_idx, i, j);\n                let idx11 = Self::linear_index(i_next, j_next, k_idx, i, j);\n\n                if is_blanked(idx00) || is_blanked(idx10) || is_blanked(idx01) || is_blanked(idx11)\n                {\n                    continue;\n                }\n\n                let v00 = (j_step * i_decimated + i_step) as u32;\n                let v10 = (j_step * i_decimated + (i_step + 1)) as u32;\n                let v01 = ((j_step + 1) * i_decimated + i_step) as u32;\n                let v11 = ((j_step + 1) * i_decimated + (i_step + 1)) as u32;\n\n                line_indices.extend_from_slice(\u0026[v00, v10, v10, v11, v11, v01, v01, v00]);\n\n                triangle_indices.extend_from_slice(\u0026[v00, v10, v11, v00, v11, v01]);\n            }\n        }\n\n        let mut normals = vec![0.0f32; vertices.len()];\n        for tri in triangle_indices.chunks(3) {\n            if tri.len() \u003c 3 {\n                continue;\n            }\n            let i0 = tri[0] as usize;\n            let i1 = tri[1] as usize;\n            let i2 = tri[2] as usize;\n\n            let v0 = [vertices[i0 * 3], vertices[i0 * 3 + 1], vertices[i0 * 3 + 2]];\n            let v1 = [vertices[i1 * 3], vertices[i1 * 3 + 1], vertices[i1 * 3 + 2]];\n            let v2 = [vertices[i2 * 3], vertices[i2 * 3 + 1], vertices[i2 * 3 + 2]];\n\n            let e1 = [v1[0] - v0[0], v1[1] - v0[1], v1[2] - v0[2]];\n            let e2 = [v2[0] - v0[0], v2[1] - v0[1], v2[2] - v0[2]];\n\n            let nx = e1[1] * e2[2] - e1[2] * e2[1];\n            let ny = e1[2] * e2[0] - e1[0] * e2[2];\n            let nz = e1[0] * e2[1] - e1[1] * e2[0];\n\n            for \u0026idx in \u0026[i0, i1, i2] {\n                normals[idx * 3] += nx;\n                normals[idx * 3 + 1] += ny;\n                normals[idx * 3 + 2] += nz;\n            }\n        }\n\n        for idx in 0..(normals.len() / 3) {\n            let nx = normals[idx * 3];\n            let ny = normals[idx * 3 + 1];\n            let nz = normals[idx * 3 + 2];\n            let len = (nx * nx + ny * ny + nz * nz).sqrt();\n            if len \u003e 0.0 {\n                normals[idx * 3] /= len;\n                normals[idx * 3 + 1] /= len;\n                normals[idx * 3 + 2] /= len;\n            }\n        }\n\n        let face_count = triangle_indices.len() / 3;\n\n        MeshGeometry {\n            vertices,\n            indices: line_indices,\n            triangle_indices,\n            normals,\n            vertex_count: i_decimated * j_decimated,\n            face_count,\n            colors: None,\n        }\n    }\n\n    /// Convert PLOT3D grid to Three.js mesh geometry\n    /// This creates quad edges for wireframe display (4 edges per quad, no triangulation)\n    /// If respect_iblank is true and iblank data exists, points with iblank=0 are excluded\n    #[allow(dead_code)]\n    pub fn to_mesh_geometry(\u0026self, respect_iblank: bool) -\u003e MeshGeometry {\n        // Default to no decimation (full resolution)\n        self.to_mesh_geometry_decimated(respect_iblank, 1)\n    }\n\n    /// Helper function to convert 3D grid index to linear index\n    fn linear_index(i: usize, j: usize, k: usize, dim_i: usize, dim_j: usize) -\u003e usize {\n        k * dim_i * dim_j + j * dim_i + i\n    }\n}\n\nimpl Plot3DSolution {\n    /// Calculate total number of points\n    #[allow(dead_code)]\n    pub fn total_points(\u0026self) -\u003e usize {\n        (self.dimensions.i as usize) * (self.dimensions.j as usize) * (self.dimensions.k as usize)\n    }\n}\n\nimpl Plot3DFunction {\n    /// Calculate total number of points\n    #[allow(dead_code)]\n    pub fn total_points(\u0026self) -\u003e usize {\n        (self.dimensions.i as usize) * (self.dimensions.j as usize) * (self.dimensions.k as usize)\n    }\n}\n\n/// Parse metadata from buffer, reading as many fields as available\n/// Fields are read in order: REFMACH, ALPHA, REY, TIME, GAMINF, BETA, TINF, IGAM, HTINF, HT1, HT2, RGAS[...], FSMACH, TVREF, DTVREF\n/// If the buffer is shorter than expected, later fields will be None\nfn parse_metadata(buffer: \u0026[u8], byte_order: ByteOrder) -\u003e Plot3DMetadata {\n    let num_floats = buffer.len() / 4;\n    let mut values = Vec::with_capacity(num_floats);\n\n    // Read all available f32 values from buffer\n    for i in 0..num_floats {\n        let start = i * 4;\n        if start + 4 \u003c= buffer.len() {\n            let bytes = [\n                buffer[start],\n                buffer[start + 1],\n                buffer[start + 2],\n                buffer[start + 3],\n            ];\n            let value = match byte_order {\n                ByteOrder::LittleEndian =\u003e f32::from_le_bytes(bytes),\n                ByteOrder::BigEndian =\u003e f32::from_be_bytes(bytes),\n            };\n            values.push(value);\n        }\n    }\n\n    // Extract fields in order - if not enough values, fields remain None\n    let refmach = values.get(0).copied();\n    let alpha = values.get(1).copied();\n    let rey = values.get(2).copied();\n    let time = values.get(3).copied();\n    let gaminf = values.get(4).copied();\n    let beta = values.get(5).copied();\n    let tinf = values.get(6).copied();\n    let igam = values.get(7).copied();\n    let htinf = values.get(8).copied();\n    let ht1 = values.get(9).copied();\n    let ht2 = values.get(10).copied();\n\n    // RGAS is variable length - collect remaining values except last 3 (FSMACH, TVREF, DTVREF)\n    // If we have at least 15 values (11 fixed + 1 RGAS + 3 tail), assume last 3 are FSMACH, TVREF, DTVREF\n    let (rgas, fsmach, tvref, dtvref) = if values.len() \u003e 14 {\n        let rgas_values: Vec\u003cf32\u003e = values[11..values.len() - 3].to_vec();\n        let fsmach = values.get(values.len() - 3).copied();\n        let tvref = values.get(values.len() - 2).copied();\n        let dtvref = values.get(values.len() - 1).copied();\n        (\n            if rgas_values.is_empty() {\n                None\n            } else {\n                Some(rgas_values)\n            },\n            fsmach,\n            tvref,\n            dtvref,\n        )\n    } else if values.len() \u003e 11 {\n        // We have values beyond the first 11, but not enough for the last 3\n        let rgas_values: Vec\u003cf32\u003e = values[11..].to_vec();\n        (\n            if rgas_values.is_empty() {\n                None\n            } else {\n                Some(rgas_values)\n            },\n            None,\n            None,\n            None,\n        )\n    } else {\n        // No RGAS or tail values\n        (None, None, None, None)\n    };\n\n    Plot3DMetadata {\n        refmach,\n        alpha,\n        rey,\n        time,\n        gaminf,\n        beta,\n        tinf,\n        igam,\n        htinf,\n        ht1,\n        ht2,\n        rgas,\n        fsmach,\n        tvref,\n        dtvref,\n    }\n}\n\n/// Auto-detect byte order by reading first dimension value\n#[allow(dead_code)]\nfn detect_byte_order\u003cR: Read\u003e(reader: \u0026mut R) -\u003e io::Result\u003cByteOrder\u003e {\n    let mut buf = [0u8; 4];\n    reader.read_exact(\u0026mut buf)?;\n\n    let le_value = i32::from_le_bytes(buf);\n    let be_value = i32::from_be_bytes(buf);\n\n    // PLOT3D dimensions are typically between 1 and 10000\n    // Little-endian is more common on modern systems\n    if le_value \u003e 0 \u0026\u0026 le_value \u003c 10000 {\n        Ok(ByteOrder::LittleEndian)\n    } else if be_value \u003e 0 \u0026\u0026 be_value \u003c 10000 {\n        Ok(ByteOrder::BigEndian)\n    } else {\n        // Default to little-endian if ambiguous\n        Ok(ByteOrder::LittleEndian)\n    }\n}\n\n/// Read PLOT3D grid file (binary format)\n/// PLOT3D format specification (Fortran unformatted):\n/// - Record 1: number of grids (int32) - surrounded by record markers\n/// - Record 2: For each grid: I, J, K dimensions (3 x int32 x num_grids) - surrounded by record markers  \n/// - Records 3+: Grid coordinates: X, Y, Z arrays (float32) - each array in its own record with markers\n#[allow(dead_code)]\npub fn read_plot3d_grid\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e io::Result\u003cVec\u003cPlot3DGrid\u003e\u003e {\n    let path_ref = path.as_ref();\n    let file = File::open(path_ref)?;\n    let mut reader = BufReader::new(file);\n\n    // Skip opening record marker for number of grids\n    skip_record_marker(\u0026mut reader)?;\n\n    // Read number of grids\n    let num_grids = read_i32(\u0026mut reader, ByteOrder::LittleEndian)?; // Try little-endian first\n\n    // Skip closing record marker\n    skip_record_marker(\u0026mut reader)?;\n\n    let byte_order = if num_grids \u003e 0 \u0026\u0026 num_grids \u003c 1000 {\n        ByteOrder::LittleEndian\n    } else {\n        // Try big-endian\n        let file = File::open(path_ref)?;\n        let mut reader = BufReader::new(file);\n        skip_record_marker(\u0026mut reader)?;\n        let num_grids_be = read_i32(\u0026mut reader, ByteOrder::BigEndian)?;\n        skip_record_marker(\u0026mut reader)?;\n\n        if num_grids_be \u003e 0 \u0026\u0026 num_grids_be \u003c 1000 {\n            ByteOrder::BigEndian\n        } else {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\n                    \"Invalid number of grids: {} (LE) or {} (BE)\",\n                    num_grids, num_grids_be\n                ),\n            ));\n        }\n    };\n\n    // Re-read from start with correct byte order\n    let file = File::open(path_ref)?;\n    let mut reader = BufReader::new(file);\n\n    skip_record_marker(\u0026mut reader)?;\n    let num_grids = read_i32(\u0026mut reader, byte_order)?;\n    skip_record_marker(\u0026mut reader)?;\n\n    if num_grids \u003c= 0 || num_grids \u003e 1000 {\n        return Err(io::Error::new(\n            io::ErrorKind::InvalidData,\n            format!(\"Invalid number of grids: {}\", num_grids),\n        ));\n    }\n\n    let mut grids = Vec::with_capacity(num_grids as usize);\n\n    // Read dimensions for all grids (in one record with markers)\n    skip_record_marker(\u0026mut reader)?;\n    let mut dimensions_list = Vec::with_capacity(num_grids as usize);\n    for _ in 0..num_grids {\n        let i = read_i32(\u0026mut reader, byte_order)? as u32;\n        let j = read_i32(\u0026mut reader, byte_order)? as u32;\n        let k = read_i32(\u0026mut reader, byte_order)? as u32;\n\n        if i == 0 || j == 0 || k == 0 {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\"Invalid dimensions: {}x{}x{}\", i, j, k),\n            ));\n        }\n\n        dimensions_list.push(GridDimensions { i, j, k });\n    }\n    skip_record_marker(\u0026mut reader)?;\n\n    // Read coordinate data for each grid\n    for dims in dimensions_list {\n        let total_points = (dims.i as usize) * (dims.j as usize) * (dims.k as usize);\n\n        let (x_coords, y_coords, z_coords, _precision) =\n            read_xyz_coords_with_markers(\u0026mut reader, total_points, byte_order)?;\n\n        // Try to read iblank array if present\n        let iblank = try_read_iblank_array(\u0026mut reader, total_points, byte_order)?;\n\n        grids.push(Plot3DGrid {\n            dimensions: dims,\n            x_coords,\n            y_coords,\n            z_coords,\n            iblank,\n        });\n    }\n\n    Ok(grids)\n}\n\n/// Read PLOT3D grid file with metadata about byte order and dimensions\npub fn read_plot3d_grid_with_metadata\u003cP: AsRef\u003cPath\u003e\u003e(\n    path: P,\n) -\u003e io::Result\u003c(Vec\u003cPlot3DGrid\u003e, GridFileMetadata)\u003e {\n    let file = File::open(\u0026path)?;\n    let mut reader = BufReader::new(file);\n\n    // Skip opening record marker for number of grids\n    skip_record_marker(\u0026mut reader)?;\n\n    // Try reading number of grids with little-endian\n    let num_grids_le = read_i32(\u0026mut reader, ByteOrder::LittleEndian)?;\n\n    // Determine byte order based on validity of num_grids\n    let byte_order = if num_grids_le \u003e 0 \u0026\u0026 num_grids_le \u003c 1000 {\n        ByteOrder::LittleEndian\n    } else {\n        // Try big-endian - need to re-read the file\n        let file = File::open(\u0026path)?;\n        let mut reader = BufReader::new(file);\n        skip_record_marker(\u0026mut reader)?;\n        let num_grids_be = read_i32(\u0026mut reader, ByteOrder::BigEndian)?;\n\n        if num_grids_be \u003e 0 \u0026\u0026 num_grids_be \u003c 1000 {\n            ByteOrder::BigEndian\n        } else {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\n                    \"Invalid number of grids: {} (LE) or {} (BE)\",\n                    num_grids_le, num_grids_be\n                ),\n            ));\n        }\n    };\n\n    let byte_order_str = match byte_order {\n        ByteOrder::LittleEndian =\u003e \"Little-Endian\",\n        ByteOrder::BigEndian =\u003e \"Big-Endian\",\n    };\n\n    // Re-read from start with correct byte order\n    let file = File::open(\u0026path)?;\n    let mut reader = BufReader::new(file);\n\n    skip_record_marker(\u0026mut reader)?;\n    let num_grids = read_i32(\u0026mut reader, byte_order)?;\n    skip_record_marker(\u0026mut reader)?;\n\n    if num_grids \u003c= 0 || num_grids \u003e 1000 {\n        return Err(io::Error::new(\n            io::ErrorKind::InvalidData,\n            format!(\"Invalid number of grids: {}\", num_grids),\n        ));\n    }\n\n    let mut grids = Vec::with_capacity(num_grids as usize);\n    let mut grid_dimensions = Vec::with_capacity(num_grids as usize);\n    let mut precision: Option\u003cPrecision\u003e = None;\n    let mut has_iblank = false;\n\n    // Read dimensions for all grids (in one record with markers)\n    skip_record_marker(\u0026mut reader)?;\n    let mut dimensions_list = Vec::with_capacity(num_grids as usize);\n    for _ in 0..num_grids {\n        let i = read_i32(\u0026mut reader, byte_order)? as u32;\n        let j = read_i32(\u0026mut reader, byte_order)? as u32;\n        let k = read_i32(\u0026mut reader, byte_order)? as u32;\n\n        if i == 0 || j == 0 || k == 0 {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\"Invalid dimensions: {}x{}x{}\", i, j, k),\n            ));\n        }\n\n        let dims = GridDimensions { i, j, k };\n        grid_dimensions.push(dims.clone());\n        dimensions_list.push(dims);\n    }\n    skip_record_marker(\u0026mut reader)?;\n\n    // Read coordinate data for each grid\n    for dims in dimensions_list {\n        let total_points = (dims.i as usize) * (dims.j as usize) * (dims.k as usize);\n\n        let (x_coords, y_coords, z_coords, grid_precision) =\n            read_xyz_coords_with_markers(\u0026mut reader, total_points, byte_order)?;\n\n        precision = Some(match precision {\n            None =\u003e grid_precision,\n            Some(existing) if existing == grid_precision =\u003e existing,\n            Some(_) =\u003e Precision::Mixed,\n        });\n\n        // Try to read iblank array if present\n        let iblank = try_read_iblank_array(\u0026mut reader, total_points, byte_order)?;\n        if iblank.is_some() {\n            has_iblank = true;\n        }\n\n        grids.push(Plot3DGrid {\n            dimensions: dims,\n            x_coords,\n            y_coords,\n            z_coords,\n            iblank,\n        });\n    }\n\n    let metadata = GridFileMetadata {\n        byte_order: byte_order_str.to_string(),\n        is_detected: true,\n        precision: precision.unwrap_or(Precision::Mixed).as_str().to_string(),\n        has_iblank,\n        num_grids: num_grids as usize,\n        grid_dimensions,\n    };\n\n    Ok((grids, metadata))\n}\n\n/// Read PLOT3D grid file in ASCII format\npub fn read_plot3d_grid_ascii\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e io::Result\u003cVec\u003cPlot3DGrid\u003e\u003e {\n    let file = File::open(path)?;\n    let reader = BufReader::new(file);\n    let mut lines = reader.lines();\n\n    // Read number of grids\n    let first_line = lines\n        .next()\n        .ok_or_else(|| io::Error::new(io::ErrorKind::InvalidData, \"Empty file\"))??;\n    let num_grids: i32 = first_line\n        .trim()\n        .parse()\n        .map_err(|_| io::Error::new(io::ErrorKind::InvalidData, \"Cannot parse number of grids\"))?;\n\n    if num_grids \u003c= 0 || num_grids \u003e 1000 {\n        return Err(io::Error::new(\n            io::ErrorKind::InvalidData,\n            format!(\"Invalid number of grids: {}\", num_grids),\n        ));\n    }\n\n    let mut grids = Vec::with_capacity(num_grids as usize);\n\n    // Read dimensions for all grids\n    let mut dimensions_list = Vec::with_capacity(num_grids as usize);\n    for _ in 0..num_grids {\n        let dims_line = lines.next().ok_or_else(|| {\n            io::Error::new(io::ErrorKind::InvalidData, \"Missing dimension line\")\n        })??;\n        let dims: Vec\u003cu32\u003e = dims_line\n            .split_whitespace()\n            .map(|s| s.parse::\u003cu32\u003e())\n            .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()\n            .map_err(|_| io::Error::new(io::ErrorKind::InvalidData, \"Cannot parse dimensions\"))?;\n\n        if dims.len() != 3 {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                \"Expected 3 dimensions (I, J, K)\",\n            ));\n        }\n\n        if dims[0] == 0 || dims[1] == 0 || dims[2] == 0 {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\"Invalid dimensions: {}x{}x{}\", dims[0], dims[1], dims[2]),\n            ));\n        }\n\n        dimensions_list.push(GridDimensions {\n            i: dims[0],\n            j: dims[1],\n            k: dims[2],\n        });\n    }\n\n    // Read coordinate data for each grid\n    for dims in dimensions_list {\n        let total_points = (dims.i as usize) * (dims.j as usize) * (dims.k as usize);\n        let mut x_coords = Vec::with_capacity(total_points);\n        let mut y_coords = Vec::with_capacity(total_points);\n        let mut z_coords = Vec::with_capacity(total_points);\n\n        // Read coordinates (typically one per line or multiple per line)\n        let mut values_read = 0;\n        let mut current_array = 0; // 0 = x, 1 = y, 2 = z\n\n        for line in lines.by_ref() {\n            let line = line?;\n            let values: Vec\u003cf32\u003e = line\n                .split_whitespace()\n                .map(|s| s.parse::\u003cf32\u003e())\n                .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()\n                .map_err(|_| {\n                    io::Error::new(io::ErrorKind::InvalidData, \"Cannot parse coordinate value\")\n                })?;\n\n            for value in values {\n                match current_array {\n                    0 =\u003e x_coords.push(value),\n                    1 =\u003e y_coords.push(value),\n                    2 =\u003e z_coords.push(value),\n                    _ =\u003e unreachable!(),\n                }\n                values_read += 1;\n\n                if values_read == total_points {\n                    current_array += 1;\n                    values_read = 0;\n                    if current_array == 3 {\n                        break;\n                    }\n                }\n            }\n\n            if current_array == 3 {\n                break;\n            }\n        }\n\n        if x_coords.len() != total_points\n            || y_coords.len() != total_points\n            || z_coords.len() != total_points\n        {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\n                    \"Incomplete coordinate data: expected {}, got {}/{}/{} values\",\n                    total_points,\n                    x_coords.len(),\n                    y_coords.len(),\n                    z_coords.len()\n                ),\n            ));\n        }\n\n        grids.push(Plot3DGrid {\n            dimensions: dims,\n            x_coords,\n            y_coords,\n            z_coords,\n            iblank: None, // ASCII format typically doesn't include iblank\n        });\n    }\n\n    Ok(grids)\n}\n\n/// Read PLOT3D solution file (Q file) in binary format\npub fn read_plot3d_solution\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e io::Result\u003cVec\u003cPlot3DSolution\u003e\u003e {\n    let path_ref = path.as_ref();\n    let file = File::open(path_ref)?;\n    let mut reader = BufReader::new(file);\n\n    // Try little-endian first\n    skip_record_marker(\u0026mut reader)?;\n    let num_grids_le = read_i32(\u0026mut reader, ByteOrder::LittleEndian)?;\n    skip_record_marker(\u0026mut reader)?;\n\n    let byte_order = if num_grids_le \u003e 0 \u0026\u0026 num_grids_le \u003c 1000 {\n        ByteOrder::LittleEndian\n    } else {\n        // Try big-endian\n        let file = File::open(path_ref)?;\n        let mut reader = BufReader::new(file);\n        skip_record_marker(\u0026mut reader)?;\n        let num_grids_be = read_i32(\u0026mut reader, ByteOrder::BigEndian)?;\n        skip_record_marker(\u0026mut reader)?;\n\n        if num_grids_be \u003e 0 \u0026\u0026 num_grids_be \u003c 1000 {\n            ByteOrder::BigEndian\n        } else {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\n                    \"Invalid number of grids: {} (LE) or {} (BE)\",\n                    num_grids_le, num_grids_be\n                ),\n            ));\n        }\n    };\n\n    // Re-read from start with correct byte order\n    let file = File::open(path_ref)?;\n    let mut reader = BufReader::new(file);\n\n    skip_record_marker(\u0026mut reader)?;\n    let num_grids = read_i32(\u0026mut reader, byte_order)?;\n    skip_record_marker(\u0026mut reader)?;\n\n    // Read dimensions and NQ, NQC from a single record\n    skip_record_marker(\u0026mut reader)?;\n    let mut dimensions_list = Vec::with_capacity(num_grids as usize);\n    for _ in 0..num_grids {\n        let i = read_i32(\u0026mut reader, byte_order)? as u32;\n        let j = read_i32(\u0026mut reader, byte_order)? as u32;\n        let k = read_i32(\u0026mut reader, byte_order)? as u32;\n\n        if i == 0 || j == 0 || k == 0 {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\"Invalid dimensions: {}x{}x{}\", i, j, k),\n            ));\n        }\n\n        dimensions_list.push(GridDimensions { i, j, k });\n    }\n\n    // Read NQ (number of solution variables) and NQC (number of conservative variables)\n    let nq = read_i32(\u0026mut reader, byte_order)? as usize;\n    let _nqc = read_i32(\u0026mut reader, byte_order)? as usize;\n    skip_record_marker(\u0026mut reader)?;\n\n    if nq \u003c 5 || nq \u003e 100 {\n        return Err(io::Error::new(\n            io::ErrorKind::InvalidData,\n            format!(\"Invalid NQ: {}\", nq),\n        ));\n    }\n\n    let mut solutions = Vec::with_capacity(num_grids as usize);\n\n    // Track the first precision detected (should be same for whole file)\n    let mut detected_precision: Option\u003cPrecision\u003e = None;\n\n    // Read solution data for each grid\n    for (grid_index, dims) in dimensions_list.into_iter().enumerate() {\n        let total_points = (dims.i as usize) * (dims.j as usize) * (dims.k as usize);\n\n        // FIRST: Detect precision from Q array record size before reading metadata\n        // Peek at the Q array record marker to determine f32 vs f64\n        // We need to know this before reading data, so read metadata and Q positions first\n\n        // Record sequence: metadata record marker, metadata, closing marker, Q record marker, ...\n        // Read metadata record opening marker\n        let metadata_record_size = read_record_marker(\u0026mut reader, byte_order)? as usize;\n\n        // Read and store metadata buffer\n        let mut metadata_buf = vec![0u8; metadata_record_size];\n        reader.read_exact(\u0026mut metadata_buf).map_err(|e| {\n            io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\"Failed to read metadata record: {}\", e),\n            )\n        })?;\n        skip_record_marker(\u0026mut reader)?;\n\n        // Now read the Q array record marker to detect precision BEFORE reading Q data\n        let q_record_size = read_record_marker(\u0026mut reader, byte_order)? as usize;\n\n        // Determine precision based on Q record size\n        // NQ variables * total_points values per variable\n        let expected_f32_size = nq * total_points * 4; // f32 = 4 bytes\n        let expected_f64_size = nq * total_points * 8; // f64 = 8 bytes\n\n        let precision = if q_record_size == expected_f32_size {\n            Precision::F32\n        } else if q_record_size == expected_f64_size {\n            Precision::F64\n        } else {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\n                    \"Invalid Q record size: expected {} bytes (f32) or {} bytes (f64), got {} bytes\",\n                    expected_f32_size, expected_f64_size, q_record_size\n                ),\n            ));\n        };\n\n        // Track the first precision detected\n        if detected_precision.is_none() {\n            detected_precision = Some(precision);\n        }\n\n        // Parse metadata - will read as many fields as are available\n        let metadata = parse_metadata(\u0026metadata_buf, byte_order);\n\n        // Now read Q data with the detected precision\n        let mut q_data = vec![Vec::with_capacity(total_points); nq];\n        for n in 0..nq {\n            q_data[n] = match precision {\n                Precision::F32 =\u003e read_f32_array(\u0026mut reader, total_points, byte_order)?,\n                Precision::F64 =\u003e {\n                    // Read f64 and convert to f32 for storage (lossy but preserves values)\n                    let f64_data = read_f64_array(\u0026mut reader, total_points, byte_order)?;\n                    f64_data.iter().map(|\u0026v| v as f32).collect()\n                }\n                Precision::Mixed =\u003e {\n                    return Err(io::Error::new(\n                        io::ErrorKind::InvalidData,\n                        \"Mixed precision not supported for solution data\",\n                    ));\n                }\n            };\n        }\n\n        skip_record_marker(\u0026mut reader)?;\n\n        // Extract the conservative variables (first 5) and gamma (6th if present)\n        // NQ = 6 + NQC + NQT where first 6 are: rho*, rho*u*, rho*v*, rho*w*, rho*e0*, gamma\n        let rho = q_data.get(0).cloned().unwrap_or_default();\n        let rhou = q_data.get(1).cloned().unwrap_or_default();\n        let rhov = q_data.get(2).cloned().unwrap_or_default();\n        let rhow = q_data.get(3).cloned().unwrap_or_default();\n        let rhoe = q_data.get(4).cloned().unwrap_or_default();\n        let gamma = q_data.get(5).cloned(); // Optional: ratio of specific heats\n\n        // Validate we got the right amount of data\n        if rho.len() != total_points\n            || rhou.len() != total_points\n            || rhov.len() != total_points\n            || rhow.len() != total_points\n            || rhoe.len() != total_points\n        {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                format!(\n                    \"Incomplete solution data for grid {}: expected {} points\",\n                    grid_index, total_points\n                ),\n            ));\n        }\n\n        solutions.push(Plot3DSolution {\n            grid_index,\n            dimensions: dims,\n            rho,\n            rhou,\n            rhov,\n            rhow,\n            rhoe,\n            gamma,\n            metadata: Some(metadata),\n        });\n    }\n\n    // Set metadata for logging in the command handler\n    let byte_order_str = match byte_order {\n        ByteOrder::LittleEndian =\u003e \"Little-Endian\",\n        ByteOrder::BigEndian =\u003e \"Big-Endian\",\n    };\n    let precision_str = detected_precision.unwrap_or(Precision::F32).as_str();\n    set_last_solution_metadata(SolutionFileMetadata {\n        format: \"binary\".to_string(),\n        precision: precision_str.to_string(),\n        byte_order: byte_order_str.to_string(),\n    });\n\n    Ok(solutions)\n}\n\n/// Read PLOT3D solution file in ASCII format\npub fn read_plot3d_solution_ascii\u003cP: AsRef\u003cPath\u003e\u003e(path: P) -\u003e io::Result\u003cVec\u003cPlot3DSolution\u003e\u003e {\n    let file = File::open(path)?;\n    let reader = BufReader::new(file);\n    let mut lines = reader.lines();\n\n    // Read number of grids\n    let first_line = lines\n        .next()\n        .ok_or_else(|| io::Error::new(io::ErrorKind::InvalidData, \"Empty file\"))??;\n    let num_grids: i32 = first_line\n        .trim()\n        .parse()\n        .map_err(|_| io::Error::new(io::ErrorKind::InvalidData, \"Cannot parse number of grids\"))?;\n\n    if num_grids \u003c= 0 || num_grids \u003e 1000 {\n        return Err(io::Error::new(\n            io::ErrorKind::InvalidData,\n            format!(\"Invalid number of grids: {}\", num_grids),\n        ));\n    }\n\n    let mut solutions = Vec::with_capacity(num_grids as usize);\n\n    // Read dimensions for all grids\n    let mut dimensions_list = Vec::with_capacity(num_grids as usize);\n    for _ in 0..num_grids {\n        let dims_line = lines.next().ok_or_else(|| {\n            io::Error::new(io::ErrorKind::InvalidData, \"Missing dimension line\")\n        })??;\n        let dims: Vec\u003cu32\u003e = dims_line\n            .split_whitespace()\n            .map(|s| s.parse::\u003cu32\u003e())\n            .collect::\u003cResult\u003cVec\u003c_\u003e, _\u003e\u003e()\n            .map_err(|_| io::Error::new(io::ErrorKind::InvalidData, \"Cannot parse dimensions\"))?;\n\n        if dims.len() != 3 {\n            return Err(io::Error::new(\n                io::ErrorKind::InvalidData,\n                \"Expected 3 dimensions (I, J, K)\",\n            ));\n
